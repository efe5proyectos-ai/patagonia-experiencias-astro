<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Meta Pixel Base · Patagonia Experiencias -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window,document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1501384968138883');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1501384968138883&ev=PageView&noscript=1"/></noscript>
    <!-- End Meta Pixel -->

    <title>¡Tu guía está lista! · Patagonia Experiencias</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
      tailwind.config = { theme: { extend: {
        fontFamily: { display:['Fraunces','serif'], sans:['Montserrat','sans-serif'] },
        colors: { brand:{ fuchsia:'#E91E63', fuchsiaDark:'#C2185B', ink:'#0c1318' } }
      } } }
    </script>
    <style>
      body { font-family:'Montserrat',sans-serif; background:#0c1318; color:#f4f1ec; min-height:100vh; -webkit-font-smoothing:antialiased; }
      .font-display { font-family:'Fraunces',serif; }
      .glass { background:rgba(255,255,255,.04); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.09); }
      .reveal { opacity:0; transform:translateY(16px); animation:rv .7s cubic-bezier(.2,.7,.2,1) forwards; }
      @keyframes rv { to { opacity:1; transform:none; } }
      .pop { animation:pop .6s cubic-bezier(.2,1.4,.4,1) forwards; transform:scale(.6); opacity:0; }
      @keyframes pop { to { transform:scale(1); opacity:1; } }
    </style>
</head>
<body class="flex flex-col">
  <div class="flex-1 flex items-center justify-center px-5 py-10">
    <div id="root" class="w-full max-w-md"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDZkeRgN45FkOF8pO2rGxDJA28VZnZ8Ntg",
      authDomain: "patagonia-experiencias.firebaseapp.com",
      projectId: "patagonia-experiencias",
      storageBucket: "patagonia-experiencias.firebasestorage.app",
      messagingSenderId: "169796366610",
      appId: "1:169796366610:web:3e2c7e65262933647983cb",
      measurementId: "G-NF2R0BJG34"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const appId = 'patagonia-experiencias-app';

    const params = new URLSearchParams(location.search);
    const ventaId = params.get('id');
    const paymentId = params.get('payment_id');
    const status = params.get('status');
    const root = document.getElementById('root');

    const cargando = `<div class="text-center text-white/50"><i class="fa-solid fa-spinner fa-spin text-2xl mb-3"></i><p class="text-sm">Confirmando tu pago...</p></div>`;
    root.innerHTML = cargando;

    function pantallaError(msg, sub){
      root.innerHTML = `
        <div class="glass rounded-3xl p-8 text-center reveal">
          <div class="w-16 h-16 mx-auto rounded-full bg-amber-400/15 flex items-center justify-center mb-5">
            <i class="fa-solid fa-hourglass-half text-2xl text-amber-400"></i>
          </div>
          <h1 class="font-display text-2xl font-semibold text-white mb-2">${msg}</h1>
          <p class="text-sm text-white/55 mb-6 leading-relaxed">${sub||''}</p>
          <a href="https://wa.me/5492804356028" class="inline-flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-bold px-5 py-3 rounded-xl transition-colors">
            <i class="fa-brands fa-whatsapp"></i> Escribinos por WhatsApp
          </a>
        </div>`;
    }

    function pantallaExito(venta){
      const drive = venta.linkDrive || '';
      const web = venta.linkWeb || '';
      root.innerHTML = `
        <div class="text-center mb-6">
          <div class="w-20 h-20 mx-auto rounded-full bg-emerald-500/15 flex items-center justify-center mb-5 pop">
            <i class="fa-solid fa-circle-check text-4xl text-emerald-400"></i>
          </div>
          <p class="text-xs uppercase tracking-[0.2em] text-brand-fuchsia font-bold mb-2 reveal">Compra confirmada</p>
          <h1 class="font-display text-3xl font-semibold text-white leading-tight reveal" style="animation-delay:.1s">
            ¡Tu Guía de ${venta.region || ''} está lista!
          </h1>
          <p class="text-sm text-white/55 mt-3 reveal" style="animation-delay:.2s">
            Gracias por tu compra${venta.clienteNombre ? ', ' + venta.clienteNombre.split(' ')[0] : ''}. Accedé ahora mismo:
          </p>
        </div>

        <div class="glass rounded-3xl p-6 space-y-3 reveal" style="animation-delay:.3s">
          ${ drive ? `
          <a href="${drive}" target="_blank" rel="noopener"
            class="w-full bg-brand-fuchsia hover:bg-brand-fuchsiaDark text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2.5 transition-colors">
            <i class="fa-solid fa-file-arrow-down"></i> Descargar la guía (PDF)
          </a>` : `<p class="text-center text-amber-300 text-sm"><i class="fa-solid fa-circle-info mr-1"></i> Te enviaremos el acceso a la brevedad.</p>` }
          ${ web ? `
          <a href="${web}" target="_blank" rel="noopener"
            class="w-full glass hover:bg-white/10 text-white font-semibold py-4 rounded-xl flex items-center justify-center gap-2.5 transition-colors">
            <i class="fa-solid fa-globe"></i> Ver la guía online
          </a>` : '' }
        </div>

        <div class="glass rounded-2xl p-4 mt-4 reveal" style="animation-delay:.4s">
          <p class="text-xs text-white/50 leading-relaxed text-center">
            <i class="fa-solid fa-bookmark text-brand-fuchsia mr-1"></i>
            Guardá esta página o el PDF. Dentro de la guía vas a encontrar un <strong class="text-white/80">código QR</strong> para sumar tus beneficios en Patagonia Puntos.
          </p>
        </div>

        <div class="text-center mt-6 reveal" style="animation-delay:.5s">
          <a href="patagonia-experiencias.html" class="text-sm text-white/50 hover:text-white transition-colors inline-flex items-center gap-2">
            Ver todas las excursiones con beneficios <i class="fa-solid fa-arrow-right text-xs"></i>
          </a>
        </div>`;
    }

    (async function(){
      if (!ventaId) { return pantallaError('No encontramos tu compra', 'Faltó el identificador en el link. Si pagaste, escribinos y lo resolvemos.'); }

      const paymentIdValido = paymentId && String(paymentId).trim().length > 0 && paymentId !== 'null';
      const pagoOK = status === 'approved' && paymentIdValido;

      try {
        const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('ventas_guias').doc(ventaId);
        const doc = await ref.get();
        if (!doc.exists) { return pantallaError('No encontramos tu compra', 'Verificá el link o escribinos por WhatsApp.'); }
        let venta = doc.data();

        if (!pagoOK) {
          // Pago no aprobado (pendiente, rechazado, o link manipulado): NO entregamos la guía.
          return pantallaError('Tu pago está en proceso', 'Algunos medios de pago tardan en acreditar. Cuando se confirme, vas a poder acceder a la guía. Si ya pagaste, escribinos.');
        }

        // Pago aprobado: marcar como Pagado (una sola vez) y entregar
        if (venta.estado !== 'Pagado') {
          try {
            await ref.update({ estado:'Pagado', paymentId:String(paymentId), fechaPago:new Date().toISOString() });
            venta = { ...venta, estado:'Pagado' };
          } catch(e){ console.warn('No se pudo actualizar estado:', e); }
        }

        // Pixel Purchase (solo si no se disparó antes, evita duplicar al recargar)
        if (window.fbq && !venta.purchaseTrackeado) {
          fbq('track','Purchase', {
            content_ids:[venta.slug||venta.guiaId], content_type:'product',
            value:Number(venta.precio)||0, currency:'ARS'
          }, { eventID: String(paymentId) });
          try { await ref.update({ purchaseTrackeado:true }); } catch(e){}
        }

        pantallaExito(venta);
      } catch (e) {
        console.error(e);
        pantallaError('Hubo un problema al cargar tu compra', 'Recargá la página o escribinos por WhatsApp.');
      }
    })();
  </script>
</body>
</html>
