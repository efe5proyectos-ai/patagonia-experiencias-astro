         CAPA 4 — Bloqueador anti-barra Google Translate
         Esto se carga ANTES que cualquier otro script. Cuando Google intenta
         crear el iframe de la barra superior, le interceptamos la creación
         con un MutationObserver muy temprano y lo ocultamos al instante.
         ========================================================================= -->
    <style id="anti-google-bar">
        /* Reglas con MÁXIMA prioridad - se cargan antes de cualquier CSS de Google */
        html, body { top: 0px !important; margin-top: 0 !important; position: static !important; }
        .goog-te-banner-frame,
        .goog-te-banner-frame.skiptranslate,
        body > .skiptranslate,
        iframe.goog-te-banner-frame,
        iframe.skiptranslate,
        iframe[id^="goog"],
        iframe[name="goog"],
        iframe[src*="translate.googleusercontent.com"],
        iframe[src*="translate.google.com/translate"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            min-height: 0 !important;
            max-height: 0 !important;
            border: 0 !important;
            position: fixed !important;
            top: -9999px !important;

    <script>
        // Interceptor que se ejecuta MUY temprano, antes de cualquier render
        (function() {
            // Vigía continuo: cualquier nodo que aparezca y sea barra de Google → muerto
            function killGoogleBar() {
                // Reset desplazamiento del body (Google empuja hacia abajo)
                if (document.body) {
                    document.body.style.top = '0px';
                    document.body.style.position = 'static';
                    document.body.style.marginTop = '0';
                }
                if (document.documentElement) {
                    document.documentElement.style.top = '0px';
                    document.documentElement.style.marginTop = '0';
                }
                // Matar iframes Google
                var bad = document.querySelectorAll(
                    'iframe.goog-te-banner-frame, iframe.skiptranslate, ' +
                    'body > .skiptranslate, iframe[id^="goog"], ' +
                    'iframe[src*="translate.googleusercontent"], ' +
                    'iframe[src*="translate.google.com/translate"]'
                );
                bad.forEach(function(el) {
                    el.style.cssText = 'display:none!important;visibility:hidden!important;height:0!important;position:fixed!important;top:-9999px!important;left:-9999px!important;';
                });
            }
            // Ejecutar lo más rápido posible y sin parar
            killGoogleBar();
            // Observer SOBRE EL HTML ENTERO (incluso antes que body exista)
            if (typeof MutationObserver !== 'undefined') {
                var obs = new MutationObserver(killGoogleBar);
                obs.observe(document.documentElement, { childList: true, subtree: true });
            }
            // Backup: timer cada 100ms los primeros 10 segundos
            var t = 0, ticker = setInterval(function() {
                killGoogleBar();
                t++;
                if (t > 100) clearInterval(ticker);
            }, 100);
        })();
    </script>

    <!-- Sprint multi-idioma: Google Translate Element script
         Aviso: este widget fue oficialmente deprecado por Google en 2019 para sitios
         comerciales. Sigue funcionando técnicamente pero no hay garantías de continuidad.
         Si Google lo bloquea en el futuro, hay que migrar a Weglot/GTranslate/etc.
         Configuración:
         - pageLanguage: 'es' (idioma original del sitio)
         - includedLanguages: 'en,pt' (a qué idiomas traducir)
         - autoDisplay: false (no mostrar banner automático)
         - layout: SIMPLE (sin estilos extra) -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'es',
                includedLanguages: 'en,pt',
                autoDisplay: false,
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');

        // Helper global: cambia el idioma activo y persiste la elección
        window.cambiarIdioma = function(lang) {
            try { localStorage.setItem('pp_lang', lang); } catch(e) {}
            // Si elige español → forzamos restaurar el original
            if (lang === 'es') {
                // Borramos cookies de Google Translate y recargamos
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.' + window.location.hostname + ';';
                window.location.reload();
                return;
            }
            // Si elige otro idioma → seteamos cookie de Google Translate
            const cookieValue = '/es/' + lang;
            document.cookie = 'googtrans=' + cookieValue + '; path=/;';
            document.cookie = 'googtrans=' + cookieValue + '; path=/; domain=.' + window.location.hostname + ';';
            window.location.reload();
        };
        // Al cargar, leer preferencia guardada
        (function preLoadLang() {
            try {
                var saved = localStorage.getItem('pp_lang');
                if (saved && saved !== 'es') {
                    var cookieValue = '/es/' + saved;
                    document.cookie = 'googtrans=' + cookieValue + '; path=/;';
                }
            } catch(e) {}
        })();

        // -------------------------------------------------------------------------
        // OCULTADOR AGRESIVO de la barra de Google Translate
        // -------------------------------------------------------------------------
        // Las reglas CSS no siempre cubren todas las variantes que Google inyecta.
        // Este observer vigila el DOM y oculta cualquier elemento que sea claramente
        // de Google Translate (iframes con clase skiptranslate, banners, tooltips).
        // -------------------------------------------------------------------------
        function ocultarBarraGoogle() {
            // Ocultar iframes de Google Translate
            var iframes = document.querySelectorAll('iframe.skiptranslate, iframe.goog-te-banner-frame, iframe[id*="goog"]');
            iframes.forEach(function(f) { f.style.display = 'none'; f.style.visibility = 'hidden'; });
            // Ocultar TODOS los elementos con clase skiptranslate que estén en el body directo (suelen ser barras)
            var skips = document.querySelectorAll('body > .skiptranslate');
            skips.forEach(function(el) { el.style.display = 'none'; });
            // Forzar reset de body.top si Google lo desplazó
            if (document.body) {
                document.body.style.top = '0px';
                document.body.style.position = 'static';
            }
            if (document.documentElement) {
                document.documentElement.style.top = '0px';
            }
        }
        // Ejecutar varias veces porque Google a veces inyecta tarde
