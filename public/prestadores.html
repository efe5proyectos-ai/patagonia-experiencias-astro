<style>
        /* Fix mobile overflow: el halo ::before de plan-card.is-featured se extiende
           50px fuera de la card, lo que genera scroll horizontal en mobile.
           overflow-x: hidden en html y body lo evita sin perder el efecto visual. */
        html, body { overflow-x: hidden; max-width: 100%; }
        html { scroll-behavior: smooth; background-color: #FDFDFD; color: #2c3e50; }
        
        .hero-bg {
            /* Fallback: mismo degradado del index/hub (oxford → fuchsiaDark → fuchsia)
               para mantener consistencia visual entre páginas.
               Cuando el JS cargue heroUrl desde Firestore (config/medios), 
               se sobrescribe inline con la imagen real del prestador. */
            background-image: linear-gradient(to bottom right, #2c3e50, #C2185B, #E91E63);
            background-size: cover;
            background-position: center;
        }

        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }

        input[type="file"]::file-selector-button {
            background-color: #F3F4F6;
            border: 1px solid #E5E7EB;
            color: #2c3e50;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-right: 1rem;
            font-weight: 500;
        }
        input[type="file"]::file-selector-button:hover { background-color: #E5E7EB; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F4F6; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* === REDISEÑO CARDS DE PLANES === */
        .plan-card {
            position: relative;
            border-radius: 20px;
            padding: 1.75rem 1.5rem;
            display: flex;
            flex-direction: column;
            height: 100%;
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            background: white;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }
        .plan-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 22px 45px -18px rgba(44, 62, 80, 0.18), 0 12px 24px -12px rgba(0, 0, 0, 0.08);
        }
        /* Plan destacado (Más Popular): fucsia con gradiente sutil hacia oscuro */
        .plan-card.is-featured {
            background: linear-gradient(160deg, #E91E63 0%, #C2185B 100%);
            color: #ffffff;
            border-color: rgba(194, 24, 91, 0.5);
            transform: translateY(-8px);
            box-shadow: 0 28px 55px -22px rgba(233, 30, 99, 0.5), 0 0 0 1px rgba(194, 24, 91, 0.25);
            /* Permitimos que el halo (::before) se desborde fuera de los límites */
            overflow: visible;
        }
        /* Halo radial fucsia claro detrás de la card destacada.
           Se extiende 50px fuera de los límites en cada lado para crear el efecto
           de "spotlight". pointer-events:none para que no bloquee clicks. */
        .plan-card.is-featured::before {
            content: "";
            position: absolute;
            inset: -50px;
            background: radial-gradient(ellipse at center, rgba(233, 30, 99, 0.18) 0%, rgba(233, 30, 99, 0.08) 35%, transparent 70%);
            border-radius: 30%;
            z-index: -1;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0.9;
        }
        .plan-card.is-featured:hover {
            transform: translateY(-12px);
            box-shadow: 0 35px 65px -22px rgba(233, 30, 99, 0.6), 0 0 0 1px rgba(194, 24, 91, 0.35);
        }
        .plan-card.is-featured:hover::before {
            opacity: 1;
            transform: scale(1.05);
        }
        .plan-card .feature-glow {
            position: absolute;
            top: -50%;
            right: -25%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 60%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .plan-card.is-featured .feature-glow { opacity: 1; }

        /* Badge "Más Popular" — blanco sobre el fondo fucsia gradient */
        .badge-popular {
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            color: #C2185B;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            padding: 5px 14px;
            border-radius: 100px;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.12);
            white-space: nowrap;
            z-index: 2;
        }

        .plan-price-currency { font-size: 1rem; font-weight: 600; opacity: 0.55; vertical-align: top; line-height: 2.2; margin-right: 1px; }
        .plan-price-value { font-family: 'Inter', system-ui, sans-serif; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.035em; line-height: 1; }
        .plan-price-period { font-size: 0.8rem; font-weight: 500; opacity: 0.55; margin-left: 4px; }
        
        .plan-feature-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 0;
            font-size: 0.8125rem;
            line-height: 1.45;
        }
        .plan-feature-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(16, 185, 129, 0.12);
            color: #10b981;
            font-size: 9px;
            margin-top: 2px;
        }
        /* En la card destacada los iconitos van blancos translúcidos */
        .plan-card.is-featured .plan-feature-icon {
            background: rgba(255, 255, 255, 0.22);
            color: #ffffff;
        }
        
        .plan-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 11px 20px;
            border-radius: 11px;
            font-weight: 700;
            font-size: 0.8125rem;
            letter-spacing: 0.01em;
            transition: all 0.22s ease;
            cursor: pointer;
            text-decoration: none;
            border: none;
        }
        /* CTA fucsia (default para cards no destacadas) */
        .plan-cta-primary {
            background: #E91E63;
            color: white;
            box-shadow: 0 8px 18px -6px rgba(233, 30, 99, 0.45);
        }
        .plan-cta-primary:hover {
            background: #C2185B;
            transform: translateY(-1px);
            box-shadow: 0 12px 24px -6px rgba(233, 30, 99, 0.55);
        }
        /* CTA del plan destacado: azul oxford con texto blanco (contraste fuerte sobre fucsia) */
        .plan-cta-featured {
            background: #2c3e50;
            color: white;
            box-shadow: 0 8px 18px -6px rgba(0, 0, 0, 0.3);
        }
        .plan-cta-featured:hover {
            background: #1f2c38;
            transform: translateY(-1px);
            box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.4);
        }

        .plan-trust-strip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 22px;
            margin-top: 28px;
            padding: 16px;
            font-size: 11.5px;
            color: #64748b;
            flex-wrap: wrap;
        }
        .plan-trust-strip > div { display: flex; align-items: center; gap: 6px; }
        .plan-trust-strip i { color: #10b981; font-size: 10px; }
    </style>

    <script>
const {
  useState,
  useEffect,
  useMemo
} = React;
const firebaseConfig = {
  apiKey: "AIzaSyDZkeRgN45FkOF8pO2rGxDJA28VZnZ8Ntg",

  projectId: "patagonia-experiencias",

  messagingSenderId: "169796366610",
  appId: "1:169796366610:web:3e2c7e65262933647983cb",
  measurementId: "G-NF2R0BJG34"
};
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();
const appId = typeof __app_id !== 'undefined' ? __app_id : 'patagonia-experiencias-app';
function App() {
  const [selectedPlan, setSelectedPlan] = useState('crecimiento');
  const [billingCycle, setBillingCycle] = useState('mensual');
  const [isSubmitting, setIsSubmitting] = useState(false);
  const [showSuccess, setShowSuccess] = useState(false);
  const [user, setUser] = useState(null);
  const [isLoggingIn, setIsLoggingIn] = useState(false);
  const [loginError, setLoginError] = useState('');
  const [heroUrl, setHeroUrl] = useState('');
  const [promo, setPromo] = useState({
    activa: false,
    porcentaje: 0,
    badge: '',
    vigenciaHasta: ''
  });
  const [showTerminos, setShowTerminos] = useState(false);
  const handleGoogleLogin = async () => {
    setLoginError('');
    setIsLoggingIn(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result = await auth.signInWithPopup(provider);
      if (result.user && result.user.email) {
        setFormData(prev => ({
          ...prev,
          emailContacto: prev.emailContacto || result.user.email
        }));
      }
    } catch (e) {
      console.error('Error login Google:', e);
      if (e.code === 'auth/popup-closed-by-user') {
        setLoginError('Cerraste la ventana de Google sin confirmar.');
      } else if (e.code === 'auth/popup-blocked') {
        setLoginError('Tu navegador bloqueó la ventana. Habilitá popups e intentá de nuevo.');
      } else {
        setLoginError('Hubo un problema al iniciar sesión. Probá de nuevo.');
      }
    }
    setIsLoggingIn(false);
  };
  const handleLogout = async () => {
    try {
      await auth.signOut();
    } catch (e) {
      console.warn(e);
    }
  };
  const PLANES_FALLBACK = {
    esencial: {
      nombre: 'Plan Esencial',
      precioMensual: 50000,
      precioAnual: 40000,
      comision: 20,
      descripcionCorta: 'Perfecto para empezar a tener presencia en el directorio digital.',
      features: 'Visibilidad básica en el directorio\nPerfil con logo y dirección\nSin métricas de rendimiento',
      orden: 0,
      destacado: false,
      urlMensual: '',
      urlAnual: '',
      ctaTexto: 'Suscribirme'
    },
    crecimiento: {
      nombre: 'Plan Crecimiento',
      precioMensual: 80000,
      precioAnual: 70000,
      comision: 20,
      descripcionCorta: 'La opción ideal para destacar y captar la atención del turista.',
      features: 'Micrositio exclusivo dentro de la app\nPosicionamiento destacado en búsquedas\nGalería de fotos HD\nAcceso a estadísticas de canjes',
      orden: 1,
      destacado: true,
      urlMensual: '',
      urlAnual: '',
      ctaTexto: 'Suscribirme'
    },
    full: {
      nombre: 'Publicidad Full',
      precioMensual: 120000,
      precioAnual: 100000,
      comision: 15,
      descripcionCorta: 'Máxima exposición en todos los canales de Patagonia Experiencias.',
      features: 'Todo lo del Plan Crecimiento\nBanners rotativos en la Home\nPauta segmentada en nuestras Redes\nPresencia en revista Patagonia Magazine',
      orden: 2,
      destacado: false,
      urlMensual: '',
      urlAnual: '',
      ctaTexto: 'Suscribirme'
    }
  };
  const [planesDB, setPlanesDB] = useState(PLANES_FALLBACK);
  const [planesLoading, setPlanesLoading] = useState(true);
  const [formData, setFormData] = useState({
    razonSocial: '',
    cuit: '',
    emailContacto: '',
    telefonoFijo: '',
    aceptaTerminos: false,
    aceptaUsoDatos: false,
    tipoFiscal: '',
    direccionFiscal: '',
    nombreFantasia: '',
    descripcion: '',
    rubro: '',
    provincia: '',
    localidad: '',
    direccionLocal: '',
    whatsapp: '',
    instagram: '',
    facebook: '',
    web: '',
    beneficioDefault: '',
    nombreBeneficio: '',
    condicionesBeneficio: ''
  });
  const [logoFile, setLogoFile] = useState(null);
  const [galleryFiles, setGalleryFiles] = useState([]);
  const isFormValid = useMemo(() => {
    const camposObligatorios = [formData.nombreFantasia, formData.razonSocial, formData.cuit, formData.emailContacto, formData.telefonoFijo, formData.rubro];
    const todosLlenos = camposObligatorios.every(v => typeof v === 'string' && v.trim() !== '');
    const aceptaTodo = formData.aceptaTerminos === true && formData.aceptaUsoDatos === true;
    return todosLlenos && aceptaTodo;
  }, [formData]);
  useEffect(() => {
    const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
    return () => unsubscribe();
  }, []);
  useEffect(() => {
    const cargarPlanes = async () => {
      try {
        const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('configuracion').doc('planes');
        const snap = await docRef.get();
        if (snap.exists) {
          const data = snap.data();
          if (data._promo && typeof data._promo === 'object') {
            let activa = !!data._promo.activa;
            if (activa && data._promo.vigenciaHasta) {
              const hoyStr = new Date().toISOString().split('T')[0];
              if (data._promo.vigenciaHasta < hoyStr) activa = false;
            }
            setPromo({
              activa,
              porcentaje: Number(data._promo.porcentaje) || 0,
              badge: data._promo.badge || '',
              vigenciaHasta: data._promo.vigenciaHasta || ''
            });
            delete data._promo;
          }
          let i = 0;
          Object.keys(data).forEach(k => {
            if (typeof data[k].orden !== 'number') data[k].orden = i;
            if (typeof data[k].destacado !== 'boolean') data[k].destacado = false;
            if (!data[k].descripcionCorta) data[k].descripcionCorta = '';
            if (typeof data[k].urlMensual !== 'string') data[k].urlMensual = '';
            if (typeof data[k].urlAnual !== 'string') data[k].urlAnual = '';
            if (!data[k].ctaTexto) data[k].ctaTexto = data[k].precioMensual > 0 ? 'Suscribirme' : 'Empezar gratis';
            i++;
          });
          setPlanesDB(data);
          const keys = Object.keys(data);
          if (keys.length > 0 && !data[selectedPlan]) {
            const destacado = keys.find(k => data[k].destacado === true);
            setSelectedPlan(destacado || keys[0]);
          }
        }
      } catch (err) {
        console.warn('No se pudieron cargar planes desde Firestore. Usando fallback hardcoded.', err);
      } finally {
        setPlanesLoading(false);
      }
    };
    cargarPlanes();
  }, []);
  useEffect(() => {
    let activo = true;
    db.collection('artifacts').doc(appId).collection('public').doc('data').collection('configuracion').doc('medios').get().then(snap => {
      if (!activo || !snap.exists) return;
      const data = snap.data();
      if (data.heroPrestadores?.url) {
        setHeroUrl(data.heroPrestadores.url);
      }
    }).catch(err => console.warn('No se pudo cargar config/medios. Usando fallback CSS.', err));
    return () => {
      activo = false;
    };
  }, []);
  const planesOrdenados = useMemo(() => {
    return Object.entries(planesDB).map(([key, p]) => ({
      key,
      ...p
    })).sort((a, b) => (a.orden || 0) - (b.orden || 0));
  }, [planesDB]);
  const handleChange = e => {
    const {
      name,
      value,
      type,
      checked
    } = e.target;
    setFormData(prev => ({
      ...prev,
      [name]: type === 'checkbox' ? checked : value
    }));
  };
  const handleSubmit = async e => {

        cicloFacturacion: billingCycle,
        fechaSolicitud: new Date().toISOString(),
        estado: 'pendiente',
        userId: user.uid
      });
      const perfilRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('perfil').doc('datos');
      await perfilRef.set({
        ...formData,
        plan: selectedPlan
      }, {
        merge: true
      });
      try {
        const notifRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('notificaciones');
        await notifRef.add({
          destinatarioUid: 'admin',
          destinatarioRol: 'admin',
          tipo: 'nuevo_prestador',
          titulo: 'Nuevo prestador esperando verificación',
          mensaje: `${formData.nombreFantasia || 'Sin nombre'} (${formData.emailContacto || user.email}) acaba de registrarse y espera tu aprobación.`,
          leida: false,
          fechaCreacion: new Date().toISOString(),
          metadata: {
            prestadorUid: user.uid,
            prestadorEmail: formData.emailContacto || user.email,
            nombreFantasia: formData.nombreFantasia,
            cuit: formData.cuit,
            rubro: formData.rubro
          }
        });
      } catch (notifErr) {
        console.warn('No se pudo crear la notificación al admin:', notifErr);
      }
      try {
        const MAKE_WEBHOOK_BIENVENIDA = 'https://hook.us2.make.com/cp2fgy5e6u898t3ziy46m1hp2o2yr7xp';
        fetch(MAKE_WEBHOOK_BIENVENIDA, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            nombreAgencia: formData.nombreFantasia || formData.razonSocial || 'Prestador',

            rubro: formData.rubro || '',
            plan: selectedPlan || '',
            fecha: new Date().toISOString()
          })
        }).catch(errHook => {
          console.warn('No se pudo llamar al webhook de bienvenida:', errHook);
        });
      } catch (hookErr) {
        console.warn('Error preparando el webhook de bienvenida:', hookErr);
      }
      setShowSuccess(true);
      setTimeout(() => {
        const destino = document.getElementById('registro');
        if (destino) destino.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });else window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      }, 100);
    } catch (error) {
      console.error("Error al enviar solicitud:", error);
      alert("Hubo un error al procesar tu solicitud. Revisa tu conexión a internet.");
    } finally {
      setIsSubmitting(false);
    }
